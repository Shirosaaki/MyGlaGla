name: Continuous Integration

on:
  push:
    branches:
    - main

  pull_request:
    branches:
    - main

env:
  TARGET_REPO_URL: git@github.com:EpitechPGE3-2025/G-FUN-500-NCE-5-2-glados-1.git
jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Run make check (compile)
        run: |
          # Run the project's check target which should build/verify the code.
          # This step will fail the job if the build/compile fails.
          make

      - name: Ensure lambdananas is executable
        run: |
          # Make the style checker executable if it isn't already.
          chmod +x coding_style/lambdananas || true

      - name: Run coding style checks (lambdananas)
        run: |
          # Run the style checker and capture any output. If there is any
          # output, treat it as a failure (so the job stops and the PR fails).
          OUT=$(./coding_style/lambdananas . 2>&1 || true)
          if [ -n "${OUT}" ]; then
            echo "---- coding_style/lambdananas output ----"
            echo "$OUT"
            echo "----------------------------------------"
            echo "Style checks produced output; failing CI."
            exit 1
          fi

      - name: Build release artifact
        run: |
          # Build the release artifact (compiled executable/package)
          mkdir -p dist
          stack build --copy-bins --local-bin-path dist

      - name: Get version from cabal
        id: version
        run: |
          VERSION=$(grep '^version:' glados.cabal | head -1 | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            Release version ${{ steps.version.outputs.version }}
            Commit: ${{ github.sha }}
          artifacts: ./dist/glados
          artifactErrorsFailBuild: true
          draft: false
          prerelease: false
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
  test:
    if: 1 != 1  # Disable tests for now
    runs-on: ubuntu-latest
    needs: compile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Run unit tests (make run_test)
        run: |
          # Run the project's unit test target. This step will fail the job
          # if tests fail (non-zero exit code).
          make run_test

  docs:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository == 'EpitechPGE3-2025/G-FUN-500-NCE-5-2-glados-1'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install docsify-cli
        run: npm install -g docsify-cli

      - name: Build documentation
        run: |
          # Docsify is a static site generator - it builds the docs
          docsify generate ./docs --sidebar _sidebar.md

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs

  mirror:
    runs-on: ubuntu-latest
    needs: [compile]
    if: |
      github.repository != 'EpitechPGE3-2025/G-FUN-500-NCE-5-2-glados-1'
      && github.event_name == 'push'
      && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Mirroring Repository
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ env.TARGET_REPO_URL }}
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}