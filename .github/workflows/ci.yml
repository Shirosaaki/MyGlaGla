name: Continuous Integration

on:
  push:
    branches:
    - main

  pull_request:
    branches:
    - main

env:
  TARGET_REPO_URL: git@github.com:EpitechPGE3-2025/G-FUN-500-NCE-5-2-glados-1.git
jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Run make check (compile)
        run: |
          # Run the project's check target which should build/verify the code.
          # This step will fail the job if the build/compile fails.
          make

      - name: Ensure lambdananas is executable
        run: |
          # Make the style checker executable if it isn't already.
          chmod +x coding_style/lambdananas || true

      - name: Run coding style checks (lambdananas)
        run: |
          # Run the style checker and capture any output. If there is any
          # output, treat it as a failure (so the job stops and the PR fails).
          OUT=$(./coding_style/lambdananas . 2>&1 || true)
          if [ -n "${OUT}" ]; then
            echo "---- coding_style/lambdananas output ----"
            echo "$OUT"
            echo "----------------------------------------"
            echo "Style checks produced output; failing CI."
            exit 1
          fi

      - name: Build release artifact
        run: |
          # Build the release artifact (compiled executable/package)
          mkdir -p dist
          stack build --copy-bins --local-bin-path dist

      - name: Calculate semantic version bump
        id: semver
        run: |
          # Get current version from cabal file
          CURRENT_VERSION=$(grep '^version:' glados.cabal | head -1 | awk '{print $2}')
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          
          # Parse current version (0.x.y.z format)
          IFS='.' read -r MAJOR MINOR PATCH BUILD <<< "$CURRENT_VERSION"
          
          # Calculate lines changed in this commit
          if [ "${{ github.event_name }}" == "push" ]; then
            LINES_CHANGED=$(git diff --numstat HEAD~1..HEAD 2>/dev/null | awk '{sum+=$1+$2} END {print sum}' || echo "0")
          else
            LINES_CHANGED=0
          fi
          
          echo "lines_changed=$LINES_CHANGED" >> $GITHUB_OUTPUT
          
          # Determine version bump based on lines changed
          # Patch: < 50 lines, Minor: 50-200 lines, Major: > 200 lines
          if [ "$LINES_CHANGED" -lt 50 ]; then
            # Patch bump
            NEW_BUILD=$((BUILD + 1))
            NEW_VERSION="$MAJOR.$MINOR.$PATCH.$NEW_BUILD"
            BUMP_TYPE="patch"
          elif [ "$LINES_CHANGED" -lt 200 ]; then
            # Minor bump
            NEW_PATCH=$((PATCH + 1))
            NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH.0"
            BUMP_TYPE="minor"
          else
            # Major bump
            NEW_MINOR=$((MINOR + 1))
            NEW_VERSION="$MAJOR.$NEW_MINOR.0.0"
            BUMP_TYPE="major"
          fi
          
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
          echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update version in cabal file
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # Update version in glados.cabal
          sed -i "s/^version:.*$/version:        ${{ steps.semver.outputs.new_version }}/" glados.cabal
          echo "Updated glados.cabal to version ${{ steps.semver.outputs.new_version }}"
          cat glados.cabal | grep '^version:'

      - name: Commit version bump
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add glados.cabal
          git commit -m "chore: bump version to ${{ steps.semver.outputs.new_version }} (${{ steps.semver.outputs.bump_type }})" || true
          git push || true

      - name: Create Release with Assets
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.semver.outputs.tag }}
          name: Release ${{ steps.semver.outputs.new_version }}
          body: |
            Automated ${{ steps.semver.outputs.bump_type }} release based on commit size.
            Lines changed: ${{ steps.semver.outputs.lines_changed }}
            Current version: ${{ steps.semver.outputs.current_version }}
            New version: ${{ steps.semver.outputs.new_version }}
          artifacts: ./dist/glados
          artifactErrorsFailBuild: true
          draft: false
          prerelease: false
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
  test:
    if: 1 != 1  # Disable tests for now
    runs-on: ubuntu-latest
    needs: compile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Run unit tests (make run_test)
        run: |
          # Run the project's unit test target. This step will fail the job
          # if tests fail (non-zero exit code).
          make run_test

  docs:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository == 'EpitechPGE3-2025/G-FUN-500-NCE-5-2-glados-1'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install docsify-cli
        run: npm install -g docsify-cli

      - name: Build documentation
        run: |
          # Docsify is a static site generator - it builds the docs
          docsify generate ./docs --sidebar _sidebar.md

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs

  mirror:
    runs-on: ubuntu-latest
    needs: [compile]
    if: |
      github.repository != 'EpitechPGE3-2025/G-FUN-500-NCE-5-2-glados-1'
      && github.event_name == 'push'
      && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Mirroring Repository
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ env.TARGET_REPO_URL }}
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}