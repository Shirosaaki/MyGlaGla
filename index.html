<!DOCTYPE html>
<html lang="en" id="doc-html">
<head>
  <meta charset="UTF-8">
  <title>GLADOS Documentation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/style.min.css">
  <!-- ton style custom ici -->
</head>
<body>
  <div id="app"></div>

  <script>
    // Détecte la langue sauvegardée ou défaut
    function getCurrentLanguage() {
      return localStorage.getItem('docLanguage') || 'en';
    }

    function setLanguage(lang) {
      localStorage.setItem('docLanguage', lang);
      document.getElementById('doc-html').setAttribute('lang', lang);
    }

    const lang = getCurrentLanguage();

    window.$docsify = {
      name: 'GLADOS',
      repo: '',
      loadNavbar: true,
      basePath: '/MyGlaGla/',      // <-- juste le repo, pas de sous-path par langue ici
      fallbackLanguages: ['en'],
      loadSidebar: true,
      homepage: lang + '/README.md', // charge automatiquement la page README de la langue
      darklightTheme: {
        siteFont: "PT Sans",
        defaultTheme: 'dark',
        dark: { /* ton config dark */ },
        light: { /* ton config light */ }
      },
      plugins: [
        function(hook, vm) {
          hook.init(() => setLanguage(lang));
          hook.doneEach(() => {
            // ton plugin d'accessibilité ici (création des boutons, contrast, font size, etc.)
          });
        }
      ]
    };
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js"></script>
</body>
</html>
